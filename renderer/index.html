<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src *; img-src * data:; font-src * data:;">
  <title>Star Glaze</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Custom Title Bar -->
  <div class="titlebar" id="titlebar">
    <div class="titlebar-drag">
      <img src="./logo.png" class="titlebar-logo" alt="S">
      <span class="titlebar-title">Star Glaze</span>
      <span class="titlebar-version">v1.0.0</span>
    </div>
    <div class="titlebar-controls">
      <button class="tb-btn minimize" id="btn-minimize">
        <svg width="12" height="2" viewBox="0 0 12 2"><rect width="12" height="2" rx="1" fill="currentColor"/></svg>
      </button>
      <button class="tb-btn maximize" id="btn-maximize">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="1" width="10" height="10" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      </button>
      <button class="tb-btn close" id="btn-close">
        <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1L11 11M11 1L1 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <!-- Main Layout -->
  <div class="app-layout">
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <img src="./logo.png" alt="Star Glaze" class="sidebar-logo-img">
        <div class="sidebar-logo-text">
          <span class="logo-star">STAR</span>
          <span class="logo-glaze">GLAZE</span>
        </div>
      </div>

      <div class="sidebar-nav" id="sidebar-nav">
        <!-- Nav items injected by JS based on auth state -->
      </div>

      <!-- Sidebar Footer -->
      <div class="sidebar-footer" id="sidebar-footer">
        <div class="server-status">
          <div class="status-dot online"></div>
          <span>Server Online</span>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="content" id="content">
      <!-- Pages rendered by JS -->
    </main>
  </div>

  <!-- Floating Particles Canvas -->
  <canvas id="particles" class="particles-canvas"></canvas>

  <script src="app.js"></script>
</body>
</html>
