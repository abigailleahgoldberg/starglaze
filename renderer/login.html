<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>StarGlaze</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg:      #0D0F1A;
    --surface: #1E2038;
    --border:  #2C2F4A;
    --accent:  #D946EF;
    --purple:  #7C3AED;
    --text:    #FFFFFF;
    --sub:     #9CA3AF;
    --sub2:    #4B4F68;
    --red:     #EF4444;
  }
  html, body {
    width: 440px; height: 560px;
    background: #161830;
    font-family: 'Plus Jakarta Sans', -apple-system, 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    user-select: none;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── Floating window controls ── */
  .wc {
    position: fixed; top: 16px; right: 16px;
    display: flex; align-items: center; gap: 20px; z-index: 99;
    -webkit-app-region: no-drag;
  }
  .wc-btn {
    background: none; border: none; cursor: pointer;
    color: #A0A0B0; font-size: 14px; line-height: 1;
    padding: 4px; transition: color 0.12s; display: flex; align-items: center;
  }
  .wc-btn:hover { color: #ffffff; }
  .wc-btn.x:hover { color: var(--red); }
  .drag-area {
    position: fixed; top: 0; left: 0; right: 0; height: 50px;
    -webkit-app-region: drag; z-index: 0;
  }

  /* ── Login card ── */
  .card {
    width: 360px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 16px;
    padding: 40px 36px 32px;
    display: flex; flex-direction: column; align-items: center; gap: 0;
    position: relative; z-index: 1;
  }

  /* logo */
  .logo-wrap { margin-bottom: 20px; }
  .logo-wrap svg { display: block; }

  .brand { font-size: 24px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; margin-bottom: 6px; }
  .sub   { font-size: 13px; color: var(--sub); font-weight: 400; margin-bottom: 32px; text-align: center; }

  .fields { width: 100%; display: flex; flex-direction: column; gap: 14px; margin-bottom: 8px; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; font-weight: 600; color: var(--sub); letter-spacing: 0.3px; }
  .field input {
    background: #0D0E17; border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
    font-size: 14px; font-weight: 500; color: var(--text);
    outline: none; transition: border-color 0.15s;
    font-family: inherit; width: 100%;
  }
  .field input:focus { border-color: var(--purple); }
  .field input::placeholder { color: var(--sub2); }

  .err {
    width: 100%; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25);
    border-radius: 8px; padding: 10px 14px; margin-bottom: 4px;
    font-size: 12px; font-weight: 600; color: var(--red); display: none;
  }
  .err.show { display: block; }

  .submit {
    width: 100%; margin-top: 20px; padding: 14px;
    background: linear-gradient(135deg, #7C3AED, #9333EA);
    border: none; border-radius: 10px;
    color: white; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: opacity 0.15s; font-family: inherit;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .submit:hover { opacity: 0.9; }
  .submit:disabled { opacity: 0.5; cursor: not-allowed; }

  .links {
    display: flex; justify-content: center; gap: 24px; margin-top: 20px; width: 100%;
  }
  .link {
    font-size: 12px; color: var(--sub); font-weight: 500; cursor: pointer;
    transition: color 0.12s; text-decoration: none;
  }
  .link:hover { color: var(--text); }

  /* spinner */
  .spin {
    display: none; width: 15px; height: 15px;
    border: 2px solid rgba(255,255,255,0.25); border-top-color: white;
    border-radius: 50%; animation: spin 0.65s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .submit.loading .label { display: none; }
  .submit.loading .spin { display: block; }
</style>
</head>
<body>

<div class="drag-area"></div>
<div class="wc">
  <button class="wc-btn" onclick="sg.windowMinimize()">
    <svg width="12" height="2" viewBox="0 0 12 2"><rect width="12" height="2" rx="1" fill="currentColor"/></svg>
  </button>
  <button class="wc-btn x" onclick="sg.windowClose()">
    <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1L11 11M11 1L1 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
  </button>
</div>

<div class="card">
  <!-- Phoenix logo -->
  <div class="logo-wrap">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Stylized star/burst logo -->
      <circle cx="24" cy="24" r="22" fill="rgba(217,70,239,0.12)"/>
      <path d="M24 6 L27 18 L38 12 L30 22 L42 24 L30 26 L38 36 L27 30 L24 42 L21 30 L10 36 L18 26 L6 24 L18 22 L10 12 L21 18 Z" fill="#D946EF" opacity="0.9"/>
      <circle cx="24" cy="24" r="5" fill="#D946EF"/>
    </svg>
  </div>

  <div class="brand">StarGlaze</div>
  <div class="sub">OG Fortnite Private Server — Chapter 1, Season 8</div>

  <div class="fields">
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="off" spellcheck="false">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••••">
    </div>
  </div>

  <div class="err" id="err"></div>

  <button class="submit" id="submit" onclick="doLogin()">
    <span class="label">Sign In</span>
    <div class="spin"></div>
  </button>

  <div class="links">
    <a class="link" onclick="sg.openExternal('http://26.252.123.243:8080/register')">Create Account</a>
    <a class="link" onclick="sg.openExternal('http://26.252.123.243:8080/forgot')">Forgot Password</a>
  </div>
</div>

<script>
const emailEl  = document.getElementById("email");
const passEl   = document.getElementById("password");
const submitEl = document.getElementById("submit");
const errEl    = document.getElementById("err");

function showErr(msg) { errEl.textContent = msg; errEl.classList.add("show"); }
function clearErr()   { errEl.classList.remove("show"); }

async function doLogin() {
  const email = emailEl.value.trim();
  const password = passEl.value;
  if (!email || !password) { showErr("Please enter your email and password."); return; }
  clearErr();
  submitEl.classList.add("loading");
  submitEl.disabled = true;
  const res = await sg.login({ username: email, password });
  submitEl.classList.remove("loading");
  submitEl.disabled = false;
  if (res.ok) { await sg.openMain(); }
  else { showErr(res.error || "Invalid email or password."); }
}

document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
emailEl.focus();
</script>
</body>
</html>
